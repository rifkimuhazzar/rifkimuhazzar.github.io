<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rifki Muhazzar</title>
    <link href="css/styles.css" rel="stylesheet" />
  </head>

  <body>
    <!-- NAVBAR -->
    <header>
      <nav class="navbar">
        <ul class="nav-menu">
          <li><a id="nav-link" href="#about">About</a></li>
          <li><a id="nav-link" href="#portfolio">Portfolio</a></li>
          <li><a id="nav-link" href="#contact">Contact</a></li>
        </ul>

        <!-- only in mobile size -->
        <div class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </header>

    <!-- Hero Area -->
    <section id="about">
      <p class="p-1">Hello, my name is</p>
      <h1>Rifki Muhazzar</h1>
      <p class="p-2">I am a Student</p>
    </section>

    <!-- Portfolio Area -->
    <section id="portfolio">
      <h2>Portfolio</h2>
      <div class="grid-projects">
        <!-- Portfolio 1 -->
        <div class="project-tile">
          <a href="https://rifkimuhazzar.github.io/survey-form/">
            <img
              class="project-images"
              src="images/survey-form.png"
              alt="Survey Form"
            />Survey Form
            <p>HTML, CSS</p>
          </a>
        </div>

        <!-- Portfolio 2 -->
        <div class="project-tile">
          <a href="https://rifkimuhazzar.github.io/documentation-page">
            <img
              class="project-images"
              src="images/technical-documentation-page.png"
              alt="Survey Form"
            />Documentation Page
            <p>HTML, CSS</p>
          </a>
        </div>

        <!-- Portfolio 3 -->
        <div class="project-tile">
          <a href="https://rifkimuhazzar.github.io/javascript-todolist/">
            <img
              class="project-images"
              src="images/todolist.png"
              alt="JavaScript Todolist"
            />JavaScript Todolist
            <p>HTML, CSS, JavaScript</p>
          </a>
        </div>
      </div>

      <!-- <button type="submit" class="btn show-more">Show more</button> -->
    </section>

    <!-- Contact Area -->
    <section id="contact">
      <h2>Contact</h2>
      <form action="get" class="form">
        <label for="email"
          >Email
          <input type="email" name="email" id="email" required />
        </label>

        <label for="message"
          >Message
          <textarea name="message" id="message" required></textarea>
        </label>

        <button type="submit" class="btn send">Send</button>
      </form>
    </section>

    <!-- Footer -->
    <footer>
      <p>Designed and Built by Rifki Muhazzar</p>
    </footer>

    <script src="scripts/script.js"></script>
  </body>
</html>
